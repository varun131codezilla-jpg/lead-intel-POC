<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Editorial Intelligence | Results</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Inter', sans-serif; background-color: #060e20; color: #dee5ff; }
    h1, h3 { font-family: 'Manrope', sans-serif; }
</style>
</head>
<body class="p-10">
    <a href="/" class="text-indigo-400 mb-8 block">← Back to Input</a>
    <h1 class="text-4xl font-extrabold mb-12">Intelligence Synthesis</h1>
    
    <div class="mb-12 text-center">
        <div class="text-6xl font-black mb-2"><span id="compositeScore">--</span>%</div>
        <div class="text-xs uppercase tracking-widest text-slate-500">Confidence Score</div>
        <div id="propensityBand" class="mt-4 text-xl font-bold text-pink-400">Analyzing...</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="bg-[#0f1930] p-6 rounded-xl border border-slate-800">
            <h3 class="font-bold mb-4">Blog Signals</h3>
            <div id="blogSignalsContainer" class="space-y-2 text-sm text-slate-300"></div>
        </div>
        <div class="bg-[#0f1930] p-6 rounded-xl border border-slate-800">
            <h3 class="font-bold mb-4">Career Signals</h3>
            <div id="careerSignalsContainer" class="space-y-2 text-sm text-slate-300"></div>
        </div>
        <div id="linkedinBox" class="bg-[#0f1930] p-6 rounded-xl border border-slate-800">
            <h3 class="font-bold mb-4">LinkedIn activity</h3>
            <div id="linkedinSignalsContainer" class="space-y-2 text-sm text-slate-300"></div>
        </div>
    </div>

    <div class="bg-[#141f38] p-8 rounded-xl border border-indigo-900/30">
        <div class="text-[10px] font-bold text-indigo-400 uppercase mb-2">Strategist's Synthesis</div>
        <p id="whitespaceInsightText" class="text-slate-400 italic">Analysis in progress...</p>
    </div>

    <script>
    window.addEventListener('load', () => {
        const raw = sessionStorage.getItem('analysisResult');
        if (!raw) return;
        const data = JSON.parse(raw);
        if (data.scores) {
            document.getElementById('compositeScore').innerText = Math.round(data.scores.composite_score || 0);
            document.getElementById('propensityBand').innerText = data.scores.confidence_band || 'N/A';
            document.getElementById('whitespaceInsightText').innerText = data.scores.details.whitespace_insight || 'No insight generated.';
            
            const render = (id, items) => {
                const el = document.getElementById(id);
                if (!el || !items) return;
                el.innerHTML = items.map(s => `<div class="flex items-center gap-2">• <span>${s}</span></div>`).join('');
            };
            render('blogSignalsContainer', data.scores.raw_signals.blog);
            render('careerSignalsContainer', data.scores.raw_signals.hiring);
            render('linkedinSignalsContainer', data.scores.raw_signals.tech);
        }
    });
    </script>
</body></html>
