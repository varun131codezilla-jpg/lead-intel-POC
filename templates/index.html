<body class="bg-surface font-body text-on-surface">
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-md shadow-sm">

<a class="text-slate-500 hover:text-slate-900 transition-colors text-sm font-medium" href="#">Dashboard</a>

<button class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-all">

<img alt="Executive Profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNVN0ld-G8QSX4O_VfxvxbaNbB2cO9PZcbbaV2PoEBgdi_q9XJo1dWttK9I9A_8qyvZZsZo2TaKdWrD8dtyNh3M2uD3cwe_Uy6l9p0mQzmPIj2zIDpF0umqRCkz1XavNyBf3QKs4el-qY1tL86EwE3M3V1wnoFeq0tfQJIAviHPX39W3E_oir0pbXie3MewriTkReB4-_ShIC7N5TD4vjgQhJuQNSbmYT-kzNyKzrh4Ndp2zgfne3vnuqSzgCWUHfEpZCaOe7Y5MA"/>

</div>
</div>
<div class="bg-slate-200/50 h-[1px]"></div>
</header>
<main class="pt-24 pb-12 px-6 flex justify-center">
<div class="w-full max-w-3xl">
<div class="mb-10 text-center md:text-left">
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-2">Ingest New Target</h1>
<p class="text-on-surface-variant text-base">Enter lead and organizational details to initiate deep intelligence analysis.</p>
</div>
<div class="bg-surface-container-lowest rounded-2xl p-8 shadow-sm">
<form id="ingestForm" class="space-y-12">
<section>
<div class="flex items-center gap-3 mb-6">
<div class="w-1 h-6 bg-primary rounded-full"></div>
<h2 class="font-headline text-xs font-bold uppercase tracking-widest text-on-surface-variant">Lead Details</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant tracking-wide">LEAD NAME</label>
<input id="leadName" class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-4 py-3 text-on-surface placeholder:text-outline/50 transition-all rounded-t-lg" placeholder="e.g. Alexander Sterling" type="text"/>
</div>
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant tracking-wide">LEAD LINKEDIN URL</label>
<input id="leadLinkedin" class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-4 py-3 text-on-surface placeholder:text-outline/50 transition-all rounded-t-lg" placeholder="linkedin.com/in/username" type="url"/>
</div>
</div>
</section>
<section>
<div class="flex items-center gap-3 mb-6">
<div class="w-1 h-6 bg-primary rounded-full"></div>
<h2 class="font-headline text-xs font-bold uppercase tracking-widest text-on-surface-variant">Company Details</h2>
</div>
<div class="space-y-8">
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant tracking-wide">COMPANY NAME</label>
<input id="companyName" class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-4 py-3 text-on-surface placeholder:text-outline/50 transition-all rounded-t-lg" placeholder="e.g. Lumina Global" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant tracking-wide">COMPANY WEBSITE</label>
<input id="companyWebsite" class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-4 py-3 text-on-surface placeholder:text-outline/50 transition-all rounded-t-lg" placeholder="https://www.company.com" type="url" required/>
</div>
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant tracking-wide">COMPANY LINKEDIN URL</label>
<input id="companyLinkedin" class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-4 py-3 text-on-surface placeholder:text-outline/50 transition-all rounded-t-lg" placeholder="linkedin.com/company/id" type="url"/>
</div>
</div>
</div>
</section>
<div class="pt-6 border-t ghost-border">
<button id="submitBtn" class="w-full md:w-auto px-10 py-4 rounded-xl btn-gradient text-on-primary font-bold shadow-lg hover:shadow-indigo-200/50 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span id="btnText">Analyze Lead</span>
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
</button>
<p class="mt-4 text-center md:text-left text-label text-[10px] text-outline uppercase tracking-[0.1em]">
                            System will process historical data and social graphs instantly.
                        </p>
</div>
</form>
</div>

<div class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full">
<span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span>
<span class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest font-label">Enterprise Intel Secured</span>
</div>
</footer>
</div>
</main>
<script>
    document.getElementById('ingestForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        
        btn.disabled = true;
        btnText.innerText = 'Synthesizing...';
        
        const website = document.getElementById('companyWebsite').value;
        const linkedin = document.getElementById('companyLinkedin').value;
        const lead_name = document.getElementById('leadName').value;
        
        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ website, linkedin_url: linkedin, lead_name })
            });

            const data = await response.json();
            sessionStorage.setItem('analysisResult', JSON.stringify(data));
            window.location.href = '/results';
        } catch (err) {
            console.error(err);
            alert('Analysis failed. Check console.');
            btn.disabled = false;
            btnText.innerText = 'Analyze Lead';
        }
    });
</script>
